{{ define "title" }}Registro | {{ appName }}{{ end }}
{{ define "content" }}
<div class="card w-full max-w-2xl bg-base-100 shadow-xl my-8">
  <div class="card-body">
    <div class="mb-8 mt-4 flex justify-center">
      <a href="/">
        <img src="/assets/images/brand/logo/logo-primary.svg" alt="{{ appName }} logo" class="h-12" />
      </a>
    </div>

    {{ template "notifications-daisy" . }}

    <form method="post" action="/register">
      <input type="hidden" name="csrf_token" value="{{.csrf_token}}" />

      <!-- Dados Pessoais -->
      <h5 class="text-primary font-semibold mb-3">Dados Pessoais</h5>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-6">
        <div class="form-control">
          <label class="label" for="name">
            <span class="label-text">Nome</span>
          </label>
          <input type="text" id="name" name="name" class="input input-bordered w-full" placeholder="Digite um nome" required value="{{.Form.Name}}" />
        </div>

        <div class="form-control">
          <label class="label" for="social_name">
            <span class="label-text">Nome Social</span>
          </label>
          <input type="text" id="social_name" name="social_name" class="input input-bordered w-full" placeholder="Ex: João das Letras" value="{{.Form.SocialName}}" />
          <label class="label">
            <span class="label-text-alt text-base-content/60">
              Este nome será utilizado como autor dos ebooks criados por você.
              Se não informado, será usado o seu nome e sobrenome.
            </span>
          </label>
        </div>

        <div class="form-control">
          <label class="label" for="cpf">
            <span class="label-text">CPF</span>
          </label>
          <input type="text" id="cpf" name="cpf" class="input input-bordered w-full cpf" placeholder="000.000.000-00" required maxlength="14" value="{{.Form.CPF}}" />
        </div>

        <div class="form-control">
          <label class="label" for="birthdate">
            <span class="label-text">Data de Nascimento</span>
          </label>
          <input type="text" id="birthdate" name="birthdate" class="input input-bordered w-full date" placeholder="DD/MM/AAAA" required maxlength="10" value="{{.Form.BirthDate}}" />
        </div>

        <div class="form-control">
          <label class="label" for="phone">
            <span class="label-text">Telefone</span>
          </label>
          <input type="tel" id="phone" name="phone" class="input input-bordered w-full phone_with_ddd" placeholder="(00) 0 0000-0000" required maxlength="16" value="{{with .Form.PhoneNumber}}{{.}}{{end}}" />
        </div>
      </div>

      <!-- Dados de Acesso -->
      <h5 class="text-primary font-semibold mb-3">Dados de Acesso</h5>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-6">
        <div class="form-control">
          <label class="label" for="email">
            <span class="label-text">E-mail</span>
          </label>
          <input type="email" id="email" name="email" class="input input-bordered w-full" placeholder="Digite seu e-mail" required value="{{with .Form.Email}}{{.}}{{end}}" />
        </div>

        <div class="form-control">
          <label class="label" for="password">
            <span class="label-text">Senha</span>
          </label>
          <input type="password" id="password" name="password" class="input input-bordered w-full" placeholder="Digite sua senha" required />
        </div>

        <div class="form-control">
          <label class="label" for="confirm-password">
            <span class="label-text">Confirmar senha</span>
          </label>
          <input type="password" id="confirm-password" name="password_confirmation" class="input input-bordered w-full" placeholder="Confirme sua senha" required />
        </div>
      </div>

      <!-- Termos -->
      <div class="form-control mb-6">
        <label class="label cursor-pointer justify-start gap-2">
          <input type="checkbox" id="agreeCheck" name="terms_accepted" class="checkbox" required />
          <span class="label-text">
            Eu concordo com os
            <a href="terms-condition-page.html" class="link link-primary">Termos de Serviço</a> e
            <a href="terms-condition-page.html" class="link link-primary">Política de Privacidade.</a>
          </span>
        </label>
      </div>

      <button type="submit" class="btn btn-primary btn-lg w-full mb-4">Criar conta</button>

      <div class="flex justify-between text-sm">
        <a href="/login" class="link link-hover">Já é membro? Login</a>
        <a href="/forget-password" class="link link-hover">Esqueceu sua senha?</a>
      </div>
    </form>
  </div>
</div>
{{ end }}
