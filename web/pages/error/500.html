<!DOCTYPE html>
<html lang="pt-br" data-theme="light">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Erro Interno do Servidor</title>
  <link rel="shortcut icon" type="image/x-icon" href="/assets/images/favicon/favicon.ico">

  <!-- Componentes DaisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet" />
  <!-- Utilitários Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Ícones FontAwesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="bg-base-200 min-h-screen flex items-center justify-center p-6">
  <div class="text-center max-w-lg w-full">
    <div class="mb-6 flex justify-center">
      <img src="/assets/images/error/500-error-img.png" alt="Erro interno do servidor" class="max-w-full h-auto"
        style="max-height: 300px;">
    </div>
    <h1 class="text-4xl font-extrabold text-error mb-4">Erro Interno do Servidor</h1>
    <p class="mb-8 text-base-content/60 text-lg">Algo deu errado. Nossa equipe foi notificada e está trabalhando para
      resolver o problema.</p>

    <div class="flex flex-wrap gap-3 justify-center">
      <a href="/dashboard" class="btn btn-primary">
        <i class="fa-solid fa-home text-sm mr-2"></i>
        Ir para o Dashboard
      </a>
      <button onclick="window.location.reload()" class="btn btn-outline text-base-content">
        <i class="fa-solid fa-rotate text-sm mr-2"></i>
        Tentar Novamente
      </button>
    </div>
  </div>
</body>

</html>
