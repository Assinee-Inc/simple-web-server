<!DOCTYPE html>
<html lang="pt-br" data-theme="light">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>404 - Página não encontrada</title>
  <link rel="shortcut icon" type="image/x-icon" href="/assets/images/favicon/favicon.ico">

  <!-- Componentes DaisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet" />
  <!-- Utilitários Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Ícones FontAwesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="bg-base-200 min-h-screen flex items-center justify-center p-6">
  <div class="text-center max-w-lg w-full">
    <div class="mb-6 flex justify-center">
      <img src="/assets/images/error/404-error-img.png" alt="Página não encontrada" class="max-w-full h-auto"
        style="max-height: 300px;">
    </div>
    <h1 class="text-4xl font-extrabold text-primary mb-4">Oops! Página não encontrada</h1>
    <p class="mb-8 text-base-content/60 text-lg">A página que você está procurando não existe ou foi movida.</p>

    <div class="flex flex-wrap gap-3 justify-center">
      <a href="/dashboard" class="btn btn-primary">
        <i class="fa-solid fa-home text-sm mr-2"></i>
        Ir para o Dashboard
      </a>
      <a href="/login" class="btn btn-outline text-base-content">
        <i class="fa-solid fa-sign-in-alt text-sm mr-2"></i>
        Fazer Login
      </a>
    </div>
  </div>
</body>

</html>
