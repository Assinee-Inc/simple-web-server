{{ define "title" }}Login | {{ appName }}{{ end }}
{{ define "content" }}
<div class="card w-full max-w-sm bg-base-100 shadow-xl">
  <div class="card-body">
    <div class="mb-8 mt-4 flex justify-center">
      <a href="/">
        <img src="/assets/images/brand/logo/logo-primary.svg" alt="{{ appName }} logo" class="h-12" />
      </a>
    </div>

    {{with .rate_limit_error}}
    <div role="alert" class="alert alert-warning mb-3">
      <i class="fas fa-exclamation-triangle"></i>
      <span>{{.}}</span>
    </div>
    {{end}}

    <form method="post" action="/login">
      {{ template "form-errors-daisy" . }}
      <input type="hidden" name="csrf_token" value="{{.csrf_token}}" />

      <div class="form-control mb-3">
        <label class="label" for="email">
          <span class="label-text">E-mail</span>
        </label>
        <input type="email" id="email" name="email" class="input input-bordered w-full" placeholder="Digite seu e-mail"
          required value="{{.Form.Email}}" />
      </div>

      <div class="form-control mb-3">
        <label class="label" for="passwordInput">
          <span class="label-text">Senha</span>
        </label>
        <div class="join w-full">
          <input type="password" id="passwordInput" name="password" class="input input-bordered join-item w-full"
            placeholder="Digite sua senha" required />
          <button type="button" id="togglePassword" class="btn btn-outline join-item">
            <i class="fas fa-eye-slash" id="toggleIcon"></i>
          </button>
        </div>
      </div>

      <div class="form-control mb-4">
        <label class="label cursor-pointer justify-start gap-2">
          <input type="checkbox" id="rememberme" class="checkbox checkbox-sm" />
          <span class="label-text">Lembrar-me</span>
        </label>
      </div>

      <button type="submit" class="btn btn-primary w-full mb-4">Entrar</button>

      <div class="flex justify-between text-sm">
        <a href="/register" class="link link-hover">Criar uma conta</a>
        <a href="/forget-password" class="link link-hover">Esqueceu sua senha?</a>
      </div>
    </form>
  </div>
</div>
<script src="/assets/js/auth.login.js"></script>
{{ end }}
