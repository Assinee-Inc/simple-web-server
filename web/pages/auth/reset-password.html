{{ define "title" }}Redefinir senha | {{ appName }}{{ end }}
{{ define "content" }}
<div class="card w-full max-w-sm bg-base-100 shadow-xl">
  <div class="card-body">
    <div class="mb-4">{{ template "logo" . }}</div>

    <div class="text-center mb-4">
      <i class="fas fa-lock fa-2x text-primary mb-3"></i>
      <h2 class="text-2xl font-bold mb-2">Redefinir senha</h2>
      <p class="text-base-content/70">Digite sua nova senha abaixo.</p>
    </div>

    <form method="POST">
      {{ template "form-errors-daisy" . }}
      <input type="hidden" name="csrf_token" value="{{.csrf_token}}" />

      <div class="form-control mb-3">
        <label class="label" for="password">
          <span class="label-text"><i class="fas fa-lock mr-2"></i>Nova senha</span>
        </label>
        <input
          type="password"
          id="password"
          name="password"
          class="input input-bordered w-full"
          placeholder="Digite sua nova senha"
          required
          minlength="6"
        />
      </div>

      <div class="form-control mb-4">
        <label class="label" for="password_confirmation">
          <span class="label-text"><i class="fas fa-check-circle mr-2"></i>Confirmar nova senha</span>
        </label>
        <input
          type="password"
          id="password_confirmation"
          name="password_confirmation"
          class="input input-bordered w-full"
          placeholder="Confirme sua nova senha"
          required
          minlength="6"
        />
      </div>

      <button type="submit" class="btn btn-primary w-full mb-4">
        <i class="fas fa-save mr-2"></i>Redefinir senha
      </button>

      <div class="text-center text-sm">
        <span>Lembrou sua senha? <a href="/login" class="link link-primary">Fazer login</a></span>
      </div>
    </form>
  </div>
</div>
{{ end }}
