{{ define "title" }}Esqueceu sua senha | {{ appName }}{{ end }}
{{ define "content" }}
<div class="card w-full max-w-sm bg-base-100 shadow-xl">
  <div class="card-body">
    <div class="mb-8 mt-4 flex justify-center">
      <a href="/">
        <img src="/assets/images/brand/logo/logo-primary.svg" alt="{{ appName }} logo" class="h-12" />
      </a>
    </div>

    <div class="text-center mb-4">
      <i class="fas fa-key fa-2x text-primary mb-3"></i>
      <h2 class="text-2xl font-bold mb-2">Esqueceu sua senha?</h2>
      <p class="text-base-content/70">
        Não se preocupe, enviaremos um email para redefinir sua senha.
      </p>
    </div>

    {{with .rate_limit_error}}
    <div role="alert" class="alert alert-warning mb-3">
      <i class="fas fa-exclamation-triangle"></i>
      <span>{{.}}</span>
    </div>
    {{end}}

    <form method="POST">
      {{ template "form-errors-daisy" . }}
      <input type="hidden" name="csrf_token" value="{{.csrf_token}}" />

      <div class="form-control mb-4">
        <label class="label" for="email">
          <span class="label-text"><i class="fas fa-envelope mr-2"></i>E-mail</span>
        </label>
        <input type="email" id="email" name="email" class="input input-bordered w-full" placeholder="Digite seu e-mail"
          required />
      </div>

      <button type="submit" class="btn btn-primary w-full mb-4">
        <i class="fas fa-paper-plane mr-2"></i>Redefinir senha
      </button>

      <div class="text-center text-sm">
        <span>Não tem uma conta? <a href="/login" class="link link-primary">Entrar</a></span>
      </div>
    </form>
  </div>
</div>
{{ end }}
